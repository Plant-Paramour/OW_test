<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Orbit Wars 教练复盘工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;
  font-family:'Segoe UI','Microsoft YaHei',monospace;color:#ccc;user-select:none}
h1{margin:8px 0 0;font-size:18px;color:#4af}
h1 small{font-size:12px;color:#888;font-weight:normal}

#filebar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  margin:8px 0;padding:8px 16px;background:#111133;border-radius:6px;
  border:1px solid #222266}
#filebar label{font-size:12px;color:#888;white-space:nowrap}
#filebar input[type=file]{color:#8bf;font-family:inherit;font-size:12px}
#filebar select{padding:4px 8px;background:#1a1a44;color:#8bf;border:1px solid #336;
  border-radius:3px;font-family:inherit;font-size:12px;max-width:300px}

#toolbar{display:flex;gap:20px;align-items:center;flex-wrap:wrap;
  margin:8px 0;padding:8px 16px;background:#111133;border-radius:6px;
  border:1px solid #222266}
.tool-group{display:flex;gap:8px;align-items:center}
.tool-group label{font-size:12px;color:#888;white-space:nowrap}

button{padding:5px 14px;background:#1a1a44;color:#8bf;border:1px solid #336;
  border-radius:3px;cursor:pointer;font-family:inherit;font-size:12px;white-space:nowrap}
button:hover{background:#224}
button.active{background:#335;border-color:#4af;color:#fff}

input[type=range]{width:160px;accent-color:#4af}

#canvas{border:1px solid #333;border-radius:4px;cursor:pointer}

#stats{display:flex;gap:30px;margin:6px 0;font-size:13px;flex-wrap:wrap;justify-content:center}
.stat{text-align:center}
.stat .val{font-size:20px;font-weight:bold}
.stat .lbl{font-size:10px;color:#888}
.stat.red .val{color:#f55}
.stat.blue .val{color:#55f}
.stat.gray .val{color:#999}

#timeline{width:700px;height:40px;position:relative;margin:4px 0 8px}
#timeline canvas{width:100%;height:100%}

.key{display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:4px;vertical-align:middle}
.key.red{background:#f44}.key.blue{background:#44f}.key.gray{background:#777}
</style>
</head>
<body>

<h1>Orbit Wars 对战回放 <small>我方(红) vs 敌方(蓝)</small></h1>

<div id="filebar">
  <div class="tool-group">
    <label>📁 加载回放</label>
    <input type="file" id="fileInput" accept=".json" onchange="loadFile(event)" multiple>
  </div>
  <div class="tool-group">
    <label>快速选择</label>
    <select id="quickSelect" onchange="loadQuickSelect()">
      <option value="">-- 选择已保存的回放 --</option>
    </select>
  </div>
  <div class="tool-group">
    <span id="fileInfo" style="font-size:11px;color:#888"></span>
  </div>
</div>

<div id="toolbar">
  <div class="tool-group">
    <button onclick="prev()" title="上一步">⏮</button>
    <button onclick="togglePlay()" id="playBtn" title="播放/暂停">▶</button>
    <button onclick="next()" title="下一步">⏭</button>
    <button onclick="seek(0)" title="回到开头">⏪</button>
    <button onclick="seek(-1)" title="跳到结尾">⏩</button>
  </div>
  <div class="tool-group">
    <label>步数</label>
    <input type="range" id="slider" min="0" max="0" value="0" oninput="seek(this.value)">
    <span id="stepLabel" style="font-size:14px;color:#fff;min-width:80px">0/0</span>
  </div>
  <div class="tool-group">
    <label>速度</label>
    <button onclick="changeSpeed(-1)">-</button>
    <span id="spd" style="font-size:14px;color:#fff;min-width:20px;text-align:center">4</span>
    <button onclick="changeSpeed(1)">+</button>
  </div>
  <div class="tool-group">
    <label>字体</label>
    <button onclick="changeFontSize(-1)">A-</button>
    <span id="fsLabel" style="font-size:14px;color:#fff;min-width:25px;text-align:center">16</span>
    <button onclick="changeFontSize(1)">A+</button>
  </div>
  <div class="tool-group">
    <label>舰队缩放</label>
    <button onclick="changeFleetScale(-0.5)">-</button>
    <span id="flsLabel" style="font-size:14px;color:#fff;min-width:20px;text-align:center">3.0</span>
    <button onclick="changeFleetScale(0.5)">+</button>
  </div>
</div>

<canvas id="canvas" width="700" height="700"></canvas>

<div id="stats">
  <div class="stat red">
    <div class="val" id="ourP">0</div><div class="lbl">我方行星</div>
  </div>
  <div class="stat red">
    <div class="val" id="ourS">0</div><div class="lbl">我方舰船</div>
  </div>
  <div class="stat red">
    <div class="val" id="ourA">0</div><div class="lbl">我方本步行动</div>
  </div>
  <div class="stat blue">
    <div class="val" id="theirP">0</div><div class="lbl">敌方行星</div>
  </div>
  <div class="stat blue">
    <div class="val" id="theirS">0</div><div class="lbl">敌方舰船</div>
  </div>
  <div class="stat blue">
    <div class="val" id="theirA">0</div><div class="lbl">敌方本步行动</div>
  </div>
  <div class="stat gray">
    <div class="val" id="neutP">0</div><div class="lbl">中立行星</div>
  </div>
</div>

<div id="timeline"><canvas id="tlCanvas"></canvas></div>

<script>
const COLORS = {
  '-1': '#777',
  '0':  '#f44',
  '1':  '#44f',
  '2':  '#4f4',
  '3':  '#f84',
};
const SUN = {x:50, y:50, r:10};
const SCALE = 6.5;
let replay = null, frame = 0, playing = false, timer = null;
let speed = 4, fontSize = 16, fleetScale = 3.0;


function initQuickSelect() {
  const sel = document.getElementById('quickSelect');
  sel.innerHTML = '<option value="">-- 加载中... --</option>';

  const xhr = new XMLHttpRequest();
  xhr.open('GET', 'list.json', true);
  xhr.responseType = 'json';
  xhr.onload = function() {
    if (xhr.status !== 200) {
      sel.innerHTML = '<option value="">-- 无法加载列表 --</option>';
      return;
    }
    const data = xhr.response;
    sel.innerHTML = '<option value="">-- 选择已保存的回放 --</option>';
    [{key: 'wins', label: '胜利'}, {key: 'losses', label: '失败'}].forEach(function(g) {
      const names = data[g.key] || [];
      if (names.length > 0) {
        const og = document.createElement('optgroup');
        og.label = g.label + ' (' + names.length + ')';
        names.forEach(function(name) {
          const o = document.createElement('option');
          o.value = g.key + '/' + name;
          o.textContent = name;
          og.appendChild(o);
        });
        sel.appendChild(og);
      }
    });
  };
  xhr.onerror = function() {
    sel.innerHTML = '<option value="">-- 无法加载列表 (使用文件选择器) --</option>';
  };
  xhr.send();
}


function loadQuickSelect() {
  const sel = document.getElementById('quickSelect');
  const val = sel.value;
  if (!val) return;
  const xhr = new XMLHttpRequest();
  xhr.open('GET', val, true);
  xhr.responseType = 'json';
  xhr.onload = function() {
    if (xhr.status === 200) {
      setReplay(xhr.response, val);
    }
  };
  xhr.send();
}

function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      setReplay(data, file.name);
    } catch(err) {
      alert('JSON 解析失败: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function setReplay(data, name) {
  replay = data;
  frame = 0;
  document.getElementById('slider').max = data.frames.length - 1;
  document.getElementById('slider').value = 0;
  const info = name + ' | ' + data.total_steps + '步 | 红' +
    (data.our_reward > 0 ? '胜' : '负') + ' | 终局行星 ' +
    data.our_planets + ':' + data.their_planets;
  document.getElementById('fileInfo').textContent = info;
  update();
}

function drawTriangle(ctx, x, y, angle, size) {
  const half = size * 0.6;
  const tipX = x + Math.cos(angle) * size;
  const tipY = y + Math.sin(angle) * size;
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(x + Math.cos(angle + 2.5) * half, y + Math.sin(angle + 2.5) * half);
  ctx.lineTo(x + Math.cos(angle - 2.5) * half, y + Math.sin(angle - 2.5) * half);
  ctx.closePath();
}

function drawFrame(idx) {
  const c = document.getElementById('canvas');
  const W = 700, H = 700;
  c.width = W; c.height = H;
  const S = SCALE, ctx = c.getContext('2d');
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);

  // Sun
  ctx.beginPath();
  ctx.arc(SUN.x*S, SUN.y*S, SUN.r*S, 0, Math.PI*2);
  const sg = ctx.createRadialGradient(SUN.x*S,SUN.y*S,0, SUN.x*S,SUN.y*S,SUN.r*S);
  sg.addColorStop(0, '#ff4'); sg.addColorStop(1, '#840');
  ctx.fillStyle = sg; ctx.fill();
  ctx.strokeStyle = '#c80'; ctx.lineWidth = 0.8; ctx.stroke();

  const f = replay.frames[idx];
  if (!f) return;

  // Fleets as triangles
  for (const fl of f.fleets) {
    const [id, owner, x, y, angle, fromP, ships] = fl;
    const triSize = Math.max(4, Math.min(18, Math.sqrt(ships) * fleetScale * 0.9));
    const fx = x*S, fy = y*S;
    drawTriangle(ctx, fx, fy, angle, triSize);
    ctx.fillStyle = COLORS[String(owner)] || '#888';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 0.6; ctx.stroke();
    // Ship count on fleet
    const fs = Math.max(7, Math.min(fontSize * 0.85, triSize * 1.3));
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + fs + 'px "Segoe UI","Microsoft YaHei",monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ships, fx, fy);
  }

  // Planets
  for (const p of f.planets) {
    const [id, owner, x, y, r, ships, prod] = p;
    const pr = Math.max(7, r*S);
    const px = x*S, py = y*S;
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI*2);
    ctx.fillStyle = COLORS[String(owner)] || '#888';
    ctx.fill();
    if (owner === 0) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.stroke(); }
    else if (owner === 1) { ctx.strokeStyle = '#aaf'; ctx.lineWidth = 1.5; ctx.stroke(); }
    else { ctx.strokeStyle = '#555'; ctx.lineWidth = 0.5; ctx.stroke(); }

    // Ship count
    const shipFs = Math.max(10, fontSize);
    ctx.font = 'bold ' + shipFs + 'px "Segoe UI","Microsoft YaHei",monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx.lineWidth = 3;
    ctx.strokeText(ships, px, py - pr*0.1);
    ctx.fillStyle = '#fff';
    ctx.fillText(ships, px, py - pr*0.1);

    // Production star for occupied planets
    if (owner !== -1) {
      const ms = Math.max(8, fontSize - 2);
      ctx.font = ms + 'px "Segoe UI","Microsoft YaHei",monospace';
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 2;
      ctx.strokeText('★', px, py + pr*0.45);
      ctx.fillStyle = owner === 0 ? '#ff0' : '#aaf';
      ctx.fillText('★', px, py + pr*0.45);
    }

    // Planet ID (small, dim)
    if (fontSize >= 10) {
      const is = Math.max(7, fontSize - 4);
      ctx.font = is + 'px "Segoe UI","Microsoft YaHei",monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillText(id, px, py - pr - 4);
    }
  }

  // Our action arrows
  for (const a of f.our_actions) {
    const [srcId, angle, ships] = a;
    const src = f.planets.find(function(p){return p[0] === srcId;});
    if (!src) continue;
    const sx = src[2]*S, sy = src[3]*S;
    const len = Math.min(40, Math.max(15, Math.sqrt(ships) * 3));
    const ex = sx + Math.cos(angle)*len, ey = sy + Math.sin(angle)*len;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
    ctx.strokeStyle = '#f66'; ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]); ctx.stroke(); ctx.setLineDash([]);
    drawTriangle(ctx, ex, ey, angle, 7);
    ctx.fillStyle = '#f66'; ctx.fill();
  }

  // Their action arrows
  for (const a of f.their_actions) {
    const [srcId, angle, ships] = a;
    const src = f.planets.find(function(p){return p[0] === srcId;});
    if (!src) continue;
    const sx = src[2]*S, sy = src[3]*S;
    const len = Math.min(40, Math.max(15, Math.sqrt(ships) * 3));
    const ex = sx + Math.cos(angle)*len, ey = sy + Math.sin(angle)*len;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
    ctx.strokeStyle = '#66f'; ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]); ctx.stroke(); ctx.setLineDash([]);
    drawTriangle(ctx, ex, ey, angle, 7);
    ctx.fillStyle = '#66f'; ctx.fill();
  }

  // Stats
  const ourPl = f.planets.filter(function(p){return p[1]===0});
  const theirPl = f.planets.filter(function(p){return p[1]===1});
  const neutPl = f.planets.filter(function(p){return p[1]===-1});
  document.getElementById('ourP').textContent = ourPl.length;
  const ourFleetShips = (f.fleets || []).reduce(function(s,fl){return fl[1]===0 ? s+fl[6] : s},0);
  document.getElementById('ourS').textContent = ourPl.reduce(function(s,p){return s+p[5]},0) + ourFleetShips;
  document.getElementById('ourA').textContent = f.our_actions.length;
  document.getElementById('theirP').textContent = theirPl.length;
  const theirFleetShips = (f.fleets || []).reduce(function(s,fl){return fl[1]===1 ? s+fl[6] : s},0);
  document.getElementById('theirS').textContent = theirPl.reduce(function(s,p){return s+p[5]},0) + theirFleetShips;
  document.getElementById('theirA').textContent = f.their_actions.length;
  document.getElementById('neutP').textContent = neutPl.length;
  document.getElementById('slider').value = idx;
  document.getElementById('stepLabel').textContent = (idx+1) + '/' + replay.frames.length;
}

function drawTimeline() {
  const tc = document.getElementById('tlCanvas');
  const W = 700, H = 40;
  tc.width = W; tc.height = H;
  const ctx = tc.getContext('2d');
  if (!replay) return;
  ctx.fillStyle = '#111133';
  ctx.fillRect(0, 0, W, H);
  const barW = W / replay.frames.length;
  for (let i = 0; i < replay.frames.length; i++) {
    const f = replay.frames[i];
    const ourS = f.planets.filter(function(p){return p[1]===0}).reduce(function(s,p){return s+p[5]},0)
      + (f.fleets || []).reduce(function(s,fl){return fl[1]===0 ? s+fl[6] : s},0);
    const theirS = f.planets.filter(function(p){return p[1]===1}).reduce(function(s,p){return s+p[5]},0)
      + (f.fleets || []).reduce(function(s,fl){return fl[1]===1 ? s+fl[6] : s},0);
    const total = ourS + theirS;
    const x = i * barW;
    if (total > 0) {
      const ratio = ourS / total;
      ctx.fillStyle = '#f44';
      ctx.fillRect(x, 0, barW+1, ratio * H);
      ctx.fillStyle = '#44f';
      ctx.fillRect(x, ratio * H, barW+1, H - ratio * H);
    }
  }
  const markX = frame * barW;
  ctx.fillStyle = '#fff';
  ctx.fillRect(markX, 0, 2, H);
}

function update() { drawFrame(frame); drawTimeline(); }
function next() { if (replay && frame < replay.frames.length-1) { frame++; update(); } }
function prev() { if (frame > 0) { frame--; update(); } }
function seek(v) {
  if (!replay) return;
  if (v === -1) frame = replay.frames.length - 1;
  else frame = parseInt(v);
  update();
}
function togglePlay() {
  if (playing) {
    playing = false;
    clearInterval(timer);
    document.getElementById('playBtn').textContent = '▶';
  } else {
    playing = true;
    document.getElementById('playBtn').textContent = '⏸';
    timer = setInterval(function() {
      if (frame >= replay.frames.length - 1) { togglePlay(); return; }
      frame++;
      update();
    }, Math.max(50, 1200 / speed));
  }
}
function changeSpeed(d) {
  speed = Math.max(1, Math.min(20, speed + d));
  document.getElementById('spd').textContent = speed;
  if (playing) {
    clearInterval(timer);
    timer = setInterval(function() {
      if (frame >= replay.frames.length - 1) { togglePlay(); return; }
      frame++;
      update();
    }, Math.max(50, 1200 / speed));
  }
}
function changeFontSize(d) {
  fontSize = Math.max(8, Math.min(32, fontSize + d));
  document.getElementById('fsLabel').textContent = fontSize;
  update();
}
function changeFleetScale(d) {
  fleetScale = Math.max(0.5, Math.min(8, fleetScale + d));
  document.getElementById('flsLabel').textContent = fleetScale.toFixed(1);
  update();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  else if (e.key === '0') { e.preventDefault(); seek(0); }
  else if (e.key === 'End' || e.key === 'e') { e.preventDefault(); seek(-1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); changeSpeed(1); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); changeSpeed(-1); }
});

document.getElementById('canvas').addEventListener('click', function(e) {
  if (e.clientX - e.target.getBoundingClientRect().left < 350) prev(); else next();
});

initQuickSelect();
</script>
</body>
</html>
