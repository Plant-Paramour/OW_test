# 临时测试: BC权重 + 无搜索 vs BC权重 + 有搜索，各30轮
ppo:
  rollout_steps: 128
  total_updates: 30
  epochs: 4
  minibatch_size: 512
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  lr: 0.0003
  max_grad_norm: 0.5

model:
  hidden_size: 256
  candidate_count: 20

env:
  candidate_count: 20
  episode_steps: 50

opponent:
  type: staged
  stages:
    - type: sniper
  eval_interval: 30
  eval_games: 100
  win_threshold: 0.90

search:
  alpha: 0.15
  alpha_decay: 0.999
  alpha_min: 0.01

terminal:
  early_terminal_scale: 3.0
